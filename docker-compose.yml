services:
  cassandra:
    image: cassandra:5.0
    container_name: cassandra_poliglota
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
      - ./dbs/cassandra_init.cql:/docker-entrypoint-initdb.d/init.cql
    environment:
      - CASSANDRA_CLUSTER_NAME=FacturacionCluster
      - CASSANDRA_ENDPOINT_SNITCH=SimpleSnitch
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 40s

volumes:
  cassandra_data:
